server:
  port: 7071

spring:

  application:
    name: employee-service

  datasource:
    url: jdbc:h2:mem:employee_db
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.caraveolobotech: DEBUG

management:

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

info:
  app:
    name: Employee Service API
    description: Employee management microservice with Spring Boot
    version: 1.0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html